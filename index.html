<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il mondo è mio</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #080c14;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', serif;
  }

  .wrap {
    width: 100%;
    max-width: 340px;
    padding: 2.5rem 1.5rem;
    text-align: center;
  }

  .title {
    font-size: 13px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #c8a96e;
    margin-bottom: 0.3rem;
    opacity: 0.8;
  }

  .pct {
    font-size: 48px;
    font-weight: normal;
    color: #f5e6c8;
    letter-spacing: -0.02em;
    line-height: 1;
    margin: 0.5rem 0 0.2rem;
  }

  .days-left {
    font-size: 11px;
    color: #4a5060;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }

  .path {
    position: relative;
    width: 100%;
    height: 320px;
    margin-bottom: 2rem;
  }

  .path svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .btn-wrap {
    margin-bottom: 0.75rem;
  }

  .btn {
    background: transparent;
    border: 1px solid #c8a96e44;
    color: #c8a96e;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-family: 'Georgia', serif;
    padding: 0.65rem 2rem;
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.3s;
  }

  .btn:hover { border-color: #c8a96e99; background: #c8a96e11; }
  .btn.done { border-color: #c8a96e88; color: #f5e6c8; background: #c8a96e18; }

  .sub-btns {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 0.6rem;
  }

  .btn-ghost {
    background: none;
    border: none;
    color: #2e3340;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-family: 'Georgia', serif;
    cursor: pointer;
    transition: color 0.2s;
    padding: 0.3rem 0;
  }

  .btn-ghost:hover { color: #4a5060; }

  .toast {
    height: 14px;
    font-size: 10px;
    color: #4a5060;
    letter-spacing: 0.1em;
    margin-top: 0.75rem;
    font-family: 'Courier New', monospace;
  }
</style>
</head>
<body>
<div class="wrap">
  <p class="title">Il mondo è mio</p>
  <div class="pct" id="pct">0%</div>
  <div class="days-left" id="days-left">365 giorni al traguardo</div>

  <div class="path">
    <svg id="path-svg" viewBox="0 0 200 320" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div class="btn-wrap">
    <button class="btn" id="btn-check" onclick="toggleToday()">Segna oggi</button>
  </div>
  <div class="sub-btns">
    <button class="btn-ghost" onclick="undo()">↩ annulla</button>
    <button class="btn-ghost" onclick="resetAll()">✕ reset</button>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script>
const START = new Date('2026-05-01');
const END   = new Date('2027-05-01');
const TOTAL = Math.round((END - START) / 86400000);
const KEY   = 'ilmondoemio_v2';

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || { days: [] }; }
  catch { return { days: [] }; }
}
function save(data) {
  try { localStorage.setItem(KEY, JSON.stringify(data)); } catch {}
}

function drawPath(fatti) {
  const svg = document.getElementById('path-svg');
  svg.innerHTML = '';
  const pct = fatti / TOTAL;

  const ns = 'http://www.w3.org/2000/svg';
  const N = 28;
  const cx = 100;

  // Generate path points — a gentle curve rising from bottom to top
  function pt(i) {
    const t = i / (N - 1);
    const x = cx + Math.sin(t * Math.PI * 1.2) * 38;
    const y = 300 - t * 270;
    return { x, y };
  }

  // Draw glow trail for done dots
  const doneDots = Math.round(pct * N);

  // Faint path line
  for (let i = 0; i < N - 1; i++) {
    const a = pt(i), b = pt(i + 1);
    const line = document.createElementNS(ns, 'line');
    line.setAttribute('x1', a.x); line.setAttribute('y1', a.y);
    line.setAttribute('x2', b.x); line.setAttribute('y2', b.y);
    line.setAttribute('stroke', '#1a2030');
    line.setAttribute('stroke-width', '1');
    svg.appendChild(line);
  }

  // Dots
  for (let i = 0; i < N; i++) {
    const { x, y } = pt(i);
    const done = i < doneDots;
    const isNext = i === doneDots;

    if (done) {
      // Glow halo
      const halo = document.createElementNS(ns, 'circle');
      halo.setAttribute('cx', x); halo.setAttribute('cy', y);
      halo.setAttribute('r', '5');
      halo.setAttribute('fill', '#c8a96e');
      halo.setAttribute('opacity', '0.15');
      svg.appendChild(halo);
    }

    const circle = document.createElementNS(ns, 'circle');
    circle.setAttribute('cx', x); circle.setAttribute('cy', y);
    circle.setAttribute('r', done ? '3' : isNext ? '2.5' : '1.8');
    circle.setAttribute('fill', done ? '#c8a96e' : isNext ? '#2e3a50' : '#151c28');
    circle.setAttribute('stroke', done ? '#f5e6c822' : isNext ? '#c8a96e55' : '#1e2535');
    circle.setAttribute('stroke-width', '1');
    svg.appendChild(circle);

    // Symbol on done dots (every 4th)
    if (done && i % 4 === 0 && i > 0) {
      const symbols = ['◈', '✦', '⊕', '◇', '✧', '⊗'];
      const sym = document.createElementNS(ns, 'text');
      sym.setAttribute('x', x + 8);
      sym.setAttribute('y', y + 4);
      sym.setAttribute('font-size', '7');
      sym.setAttribute('fill', '#c8a96e55');
      sym.setAttribute('font-family', 'Georgia, serif');
      sym.textContent = symbols[Math.floor(i / 4) % symbols.length];
      svg.appendChild(sym);
    }
  }

  // Star at the top (destination)
  const top = pt(N - 1);
  const glow = document.createElementNS(ns, 'circle');
  glow.setAttribute('cx', top.x); glow.setAttribute('cy', top.y);
  glow.setAttribute('r', '12');
  glow.setAttribute('fill', pct >= 1 ? '#c8a96e' : '#c8a96e');
  glow.setAttribute('opacity', pct >= 1 ? '0.3' : '0.06');
  svg.appendChild(glow);

  const star = document.createElementNS(ns, 'text');
  star.setAttribute('x', top.x); star.setAttribute('y', top.y + 5);
  star.setAttribute('text-anchor', 'middle');
  star.setAttribute('font-size', '12');
  star.setAttribute('fill', pct >= 1 ? '#f5e6c8' : '#2a3345');
  star.setAttribute('font-family', 'Georgia, serif');
  star.textContent = '✦';
  svg.appendChild(star);
}

function render() {
  const data = load();
  const days = data.days || [];
  const today = todayStr();
  const doneToday = days.includes(today);

  const elapsed = Math.max(0, Math.round((new Date(today) - START) / 86400000));
  const fatti = days.length;
  const rimasti = Math.max(0, TOTAL - elapsed);
  const pct = Math.round(fatti / TOTAL * 100);

  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('days-left').textContent = rimasti + ' giorni al traguardo';

  const btn = document.getElementById('btn-check');
  if (doneToday) {
    btn.textContent = 'Oggi ✓';
    btn.className = 'btn done';
  } else {
    btn.textContent = 'Segna oggi';
    btn.className = 'btn';
  }

  drawPath(fatti);
}

function toggleToday() {
  const data = load();
  const today = todayStr();
  const idx = data.days.indexOf(today);
  if (idx === -1) { data.days.push(today); showToast('segnato'); }
  else { data.days.splice(idx, 1); showToast('rimosso'); }
  save(data); render();
}

function undo() {
  const data = load();
  if (!data.days.length) { showToast('niente da annullare'); return; }
  const last = [...data.days].sort().pop();
  data.days = data.days.filter(d => d !== last);
  save(data); showToast('annullato: ' + last); render();
}

function resetAll() {
  if (confirm('Reset completo?')) { save({ days: [] }); render(); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  setTimeout(() => { t.textContent = ''; }, 2500);
}

render();
</script>
</body>
</html>
