<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Il Mondo È Mio</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }

    body {
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    /* Sfondo scala.jpg orizzontale */
    .bg-img {
      position: fixed;
      inset: 0;
      background: url('scala.jpg') center 30% / cover no-repeat;
      transform: scaleX(1.6);
      filter: brightness(0.38) saturate(1.2);
      z-index: 0;
    }

    /* Nebulosa calda animata */
    .nebula {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(ellipse 65% 50% at 18% 65%, rgba(200,80,0,0.28) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 82% 35%, rgba(220,120,0,0.22) 0%, transparent 65%),
        radial-gradient(ellipse 55% 45% at 50% 15%, rgba(255,160,20,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 40% 35% at 70% 75%, rgba(180,60,0,0.20) 0%, transparent 60%),
        radial-gradient(ellipse 85% 85% at 50% 50%, rgba(7,5,14,0.20) 0%, rgba(7,5,14,0.78) 100%);
      animation: nebulaBreath 14s ease-in-out infinite alternate;
    }

    @keyframes nebulaBreath {
      0%   { opacity: 1; }
      50%  { opacity: 0.80; }
      100% { opacity: 1; }
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      background: radial-gradient(ellipse 88% 88% at 50% 50%,
        transparent 25%, rgba(4,2,10,0.72) 100%);
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 580px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    /* Percentuale */
    .pct {
      display: flex;
      align-items: flex-start;
      line-height: 1;
      animation: breathe 5s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { filter: drop-shadow(0 0 16px rgba(255,184,48,0.75)) drop-shadow(0 0 50px rgba(255,120,0,0.3)); }
      50%       { filter: drop-shadow(0 0 28px rgba(255,215,70,1))    drop-shadow(0 0 80px rgba(255,120,0,0.5)); }
    }

    .pct-num {
      font-size: clamp(3.2rem, 11vw, 6rem);
      font-weight: 100;
      letter-spacing: -0.03em;
      color: #f0d060;
      text-shadow:
        0 0 12px rgba(255,215,70,1),
        0 0 35px rgba(255,175,20,0.7),
        0 0 70px rgba(255,100,0,0.35);
    }

    .pct-sym {
      font-size: clamp(1.3rem, 4vw, 2.2rem);
      font-weight: 200;
      color: #e8a040;
      padding-top: 0.5rem;
      opacity: 0.85;
    }

    /* Griglia */
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      justify-content: center;
      width: 100%;
    }

    .dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: rgba(200,169,110,0.12);
      border: 1.5px solid rgba(200,169,110,0.35);
      flex-shrink: 0;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, border-color 0.2s, transform 0.15s;
    }

    .dot:hover {
      background: rgba(255,184,48,0.30);
      border-color: rgba(255,184,48,0.75);
      transform: scale(1.4);
      box-shadow: 0 0 8px rgba(255,184,48,0.5);
    }

    .dot.done {
      background: radial-gradient(circle at 35% 35%, #ffe066, #ffb830);
      border-color: #f0d060;
      box-shadow:
        0 0 5px  rgba(255,184,48,1),
        0 0 12px rgba(255,184,48,0.55),
        0 0 22px rgba(255,120,0,0.25);
    }

    .dot.today:not(.done) {
      background: rgba(255,184,48,0.20);
      border-color: #ffb830;
      animation: ring 2.8s ease-in-out infinite;
    }

    .dot.today.done {
      animation: goldring 2.8s ease-in-out infinite;
    }

    @keyframes ring {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,184,48,0.6); }
      50%       { box-shadow: 0 0 0 4px rgba(255,184,48,0.15), 0 0 12px rgba(255,184,48,0.7); }
    }

    @keyframes goldring {
      0%, 100% { box-shadow: 0 0 6px rgba(255,184,48,1), 0 0 14px rgba(255,184,48,0.55), 0 0 28px rgba(255,120,0,0.3); }
      50%       { box-shadow: 0 0 10px rgba(255,215,70,1), 0 0 28px rgba(255,184,48,0.8), 0 0 50px rgba(255,120,0,0.45); }
    }

    /* Bottone */
    .btn {
      position: relative;
      padding: 12px 50px;
      background: transparent;
      border: 1px solid rgba(200,169,110,0.55);
      color: #f0d060;
      font-family: inherit;
      font-size: 0.72rem;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      cursor: pointer;
      overflow: hidden;
      transition: letter-spacing 0.4s, box-shadow 0.4s, border-color 0.4s;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(200,140,0,0.14), rgba(255,160,20,0.10));
      opacity: 0;
      transition: opacity 0.35s;
    }

    .btn:hover:not(:disabled)::before { opacity: 1; }

    .btn:hover:not(:disabled) {
      letter-spacing: 0.50em;
      border-color: #c8a96e;
      box-shadow:
        0 0 22px rgba(200,169,110,0.38),
        0 0 55px rgba(200,169,110,0.12),
        inset 0 0 22px rgba(200,140,0,0.06);
    }

    .btn:active:not(:disabled) { transform: scale(0.97); }

    .btn:disabled {
      opacity: 0.32;
      cursor: default;
      border-color: rgba(200,169,110,0.18);
    }

    .btn.segnato { color: #f0d060; opacity: 0.5; }
  </style>
</head>
<body>

<div class="bg-img"></div>
<div class="nebula"></div>
<div class="overlay"></div>
<canvas id="cvs"></canvas>

<div class="content">
  <div class="pct">
    <span class="pct-num" id="pctNum">0.0</span>
    <span class="pct-sym">%</span>
  </div>

  <div class="grid" id="grid"></div>

  <button class="btn" id="btn" onclick="segnaOggi()">Segna oggi</button>
</div>

<script>
  /* ---- canvas: stelle dense + galassie + mote dorate ---- */
  (function() {
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    let W, H, stars = [], clusters = [], motes = [];

    function resize() {
      W = cvs.width  = window.innerWidth;
      H = cvs.height = window.innerHeight;
      build();
    }

    function rand(a, b) { return a + Math.random() * (b - a); }

    function build() {
      stars = []; clusters = []; motes = [];

      // stelle abbondanti
      const n = Math.round(W * H / 2800);
      for (let i = 0; i < n; i++) {
        const warm = Math.random() > 0.55;
        stars.push({
          x: rand(0, W), y: rand(0, H),
          r: rand(0.3, 1.8),
          a: rand(0.18, 0.88),
          phase: rand(0, Math.PI * 2),
          freq:  rand(0.006, 0.024),
          r1: warm ? 255 : 220,
          g1: warm ? rand(210,245) : 230,
          b1: warm ? rand(150,200) : 255,
        });
      }

      // nuclei galattici (blob luminosi sfumati)
      for (let i = 0; i < 5; i++) {
        clusters.push({
          x: rand(0.1, 0.9) * W,
          y: rand(0.1, 0.9) * H,
          r: rand(40, 130),
          a: rand(0.04, 0.13),
          phase: rand(0, Math.PI * 2),
          freq:  rand(0.003, 0.009),
          warm: Math.random() > 0.4
        });
      }

      // mote dorate fluttuanti
      for (let i = 0; i < 22; i++) {
        motes.push({
          x: rand(0, W), y: rand(0, H) + H,
          vy: rand(0.18, 0.75),
          vx: rand(-0.4, 0.4),
          r:  rand(0.8, 2.6),
          a:  rand(0.25, 0.72),
          phase: rand(0, Math.PI * 2)
        });
      }
    }

    function frame() {
      ctx.clearRect(0, 0, W, H);

      // nuclei galattici
      clusters.forEach(c => {
        c.phase += c.freq;
        const a = c.a * (0.6 + 0.4 * Math.sin(c.phase));
        const grd = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.r);
        if (c.warm) {
          grd.addColorStop(0,   `rgba(255,200,80,${a})`);
          grd.addColorStop(0.4, `rgba(255,120,20,${a*0.5})`);
          grd.addColorStop(1,   'rgba(255,80,0,0)');
        } else {
          grd.addColorStop(0,   `rgba(255,235,180,${a})`);
          grd.addColorStop(0.5, `rgba(220,180,80,${a*0.4})`);
          grd.addColorStop(1,   'rgba(180,100,0,0)');
        }
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();
      });

      // stelle
      stars.forEach(s => {
        s.phase += s.freq;
        const a = s.a * (0.35 + 0.65 * Math.sin(s.phase));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${s.r1},${s.g1},${s.b1},${a})`;
        ctx.fill();
      });

      // mote dorate
      motes.forEach(m => {
        m.phase += 0.02;
        m.y -= m.vy; m.x += m.vx;
        if (m.y < -8) { m.y = H + 8; m.x = Math.random() * W; }
        const a = m.a * (0.45 + 0.55 * Math.sin(m.phase));
        const grd = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, m.r * 3.5);
        grd.addColorStop(0, `rgba(255,200,60,${a})`);
        grd.addColorStop(1, 'rgba(255,120,0,0)');
        ctx.beginPath();
        ctx.arc(m.x, m.y, m.r * 3.5, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();
      });

      requestAnimationFrame(frame);
    }

    resize();
    frame();
    window.addEventListener('resize', resize);
  })();

  /* ---- tracker ---- */
  const START = new Date('2026-05-01T00:00:00');
  const TOTAL = 365;
  const KEY   = 'ilmondoemio_v2';

  function load() {
    try { return JSON.parse(localStorage.getItem(KEY)) || { days: [] }; }
    catch { return { days: [] }; }
  }

  function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

  function todayIdx() {
    const t = new Date(); t.setHours(0,0,0,0);
    const s = new Date(START); s.setHours(0,0,0,0);
    return Math.floor((t - s) / 86400000);
  }

  function init() {
    const data = load();
    const ti = todayIdx();
    for (let i = 0; i < ti && i < TOTAL; i++) {
      if (!data.days.includes(i)) data.days.push(i);
    }
    save(data);
  }

  function segnaOggi() {
    const data = load();
    const ti = todayIdx();
    if (ti < 0 || ti >= TOTAL || data.days.includes(ti)) return;
    data.days.push(ti);
    save(data);
    const btn = document.getElementById('btn');
    btn.style.boxShadow = '0 0 50px rgba(255,180,48,0.8), 0 0 110px rgba(255,120,0,0.4)';
    setTimeout(() => { btn.style.boxShadow = ''; }, 800);
    render();
  }

  function render() {
    const data = load();
    const ti   = todayIdx();
    const done = data.days.length;

    document.getElementById('pctNum').textContent = (done / TOTAL * 100).toFixed(1);

    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    const frag = document.createDocumentFragment();
    for (let i = 0; i < TOTAL; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      if (data.days.includes(i)) dot.classList.add('done');
      if (i === ti)              dot.classList.add('today');
      dot.addEventListener('click', () => {
        const d = load();
        const x = d.days.indexOf(i);
        if (x === -1) d.days.push(i); else d.days.splice(x, 1);
        save(d); render();
      });
      frag.appendChild(dot);
    }
    grid.appendChild(frag);

    const btn     = document.getElementById('btn');
    const inRange = ti >= 0 && ti < TOTAL;
    const marked  = data.days.includes(ti);
    btn.disabled  = !inRange || marked;
    btn.classList.toggle('segnato', marked);
    btn.textContent = marked ? 'Giorno segnato ✦' : 'Segna oggi';
  }

  init();
  render();
</script>
</body>
</html>
