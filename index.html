<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Il Mondo È Mio</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { width: 100%; height: 100%; }

    body {
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 18px 20px;
      overflow: hidden;
      position: relative;
    }

    /* Sfondo scala.jpg tagliato in orizzontale */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url('scala.jpg') center 35% / cover no-repeat;
      transform: scaleX(1.5);
      filter: brightness(0.55) saturate(1.1);
      z-index: 0;
    }

    /* Overlay gradiente per leggibilità */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 80% at 50% 50%, rgba(7,5,14,0.25) 0%, rgba(7,5,14,0.72) 100%),
        linear-gradient(180deg, rgba(7,5,14,0.55) 0%, rgba(7,5,14,0.2) 50%, rgba(7,5,14,0.65) 100%);
      z-index: 1;
    }

    /* Particelle stellari */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--d) ease-in-out infinite var(--delay);
    }

    @keyframes twinkle {
      0%, 100% { opacity: var(--lo); transform: scale(1); }
      50%       { opacity: var(--hi); transform: scale(1.4); }
    }

    /* Mote dorate fluttuanti */
    .mote {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,184,48,0.9), rgba(255,140,0,0));
      animation: float var(--fd) linear infinite var(--fdelay);
      pointer-events: none;
    }

    @keyframes float {
      0%   { transform: translateY(110vh) translateX(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) translateX(var(--fx)); opacity: 0; }
    }

    /* Contenuto */
    .content {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 580px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    /* Percentuale */
    .pct {
      display: flex;
      align-items: flex-start;
      line-height: 1;
    }

    .pct-num {
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 100;
      letter-spacing: -0.03em;
      color: #f0d060;
      text-shadow:
        0 0 20px rgba(255,215,70,0.9),
        0 0 50px rgba(255,175,20,0.5),
        0 0 90px rgba(255,120,0,0.25);
    }

    .pct-sym {
      font-size: clamp(1.2rem, 4vw, 2rem);
      font-weight: 200;
      color: #c8a96e;
      padding-top: 0.5rem;
      opacity: 0.8;
    }

    /* Griglia */
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
      width: 100%;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(200,169,110,0.08);
      border: 1px solid rgba(200,169,110,0.18);
      flex-shrink: 0;
      cursor: pointer;
      transition: background 0.25s, box-shadow 0.25s, border-color 0.25s;
    }

    .dot:hover {
      background: rgba(200,169,110,0.28);
      border-color: rgba(200,169,110,0.6);
    }

    .dot.done {
      background: #ffb830;
      border-color: #f0d060;
      box-shadow: 0 0 4px rgba(255,184,48,0.95), 0 0 9px rgba(255,184,48,0.4);
    }

    .dot.today:not(.done) {
      background: rgba(200,169,110,0.25);
      border-color: #c8a96e;
      animation: ring 2.5s ease-in-out infinite;
    }

    .dot.today.done {
      animation: goldring 2.5s ease-in-out infinite;
    }

    @keyframes ring {
      0%, 100% { box-shadow: 0 0 0 0 rgba(200,169,110,0.45); }
      50%       { box-shadow: 0 0 0 3px rgba(200,169,110,0.12), 0 0 8px rgba(200,169,110,0.55); }
    }

    @keyframes goldring {
      0%, 100% { box-shadow: 0 0 4px rgba(255,184,48,0.95), 0 0 9px rgba(255,184,48,0.4); }
      50%       { box-shadow: 0 0 8px rgba(255,184,48,1), 0 0 22px rgba(255,184,48,0.65); }
    }

    /* Bottone */
    .btn {
      position: relative;
      padding: 11px 44px;
      background: transparent;
      border: 1px solid rgba(200,169,110,0.55);
      color: #f0d060;
      font-family: inherit;
      font-size: 0.72rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      cursor: pointer;
      overflow: hidden;
      transition: letter-spacing 0.4s, box-shadow 0.4s, border-color 0.4s, color 0.3s;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(200,169,110,0.1), rgba(255,175,20,0.16));
      opacity: 0;
      transition: opacity 0.35s;
    }

    .btn:hover:not(:disabled)::before { opacity: 1; }

    .btn:hover:not(:disabled) {
      letter-spacing: 0.46em;
      border-color: #c8a96e;
      box-shadow: 0 0 18px rgba(200,169,110,0.3), 0 0 45px rgba(200,169,110,0.1);
    }

    .btn:active:not(:disabled) { transform: scale(0.97); }

    .btn:disabled {
      opacity: 0.38;
      cursor: default;
      border-color: rgba(200,169,110,0.2);
      color: rgba(240,208,96,0.5);
    }

    .btn.segnato {
      border-color: rgba(200,169,110,0.25);
      color: rgba(240,208,96,0.45);
    }
  </style>
</head>
<body>

<!-- Particelle stellari generate via JS -->
<div class="stars" id="stars"></div>

<div class="content">
  <div class="pct">
    <span class="pct-num" id="pctNum">0.0</span>
    <span class="pct-sym">%</span>
  </div>

  <div class="grid" id="grid"></div>

  <button class="btn" id="btn" onclick="segnaOggi()">Segna oggi</button>
</div>

<script>
  const START = new Date('2026-05-01T00:00:00');
  const TOTAL = 365;
  const KEY   = 'ilmondoemio_v2';

  /* ---------- particelle ---------- */
  (function buildParticles() {
    const container = document.getElementById('stars');
    const W = window.innerWidth, H = window.innerHeight;

    // stelle
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 1.8 + 0.5;
      const lo   = (Math.random() * 0.25 + 0.05).toFixed(2);
      const hi   = (Math.random() * 0.55 + 0.35).toFixed(2);
      const d    = (Math.random() * 3 + 1.5).toFixed(1) + 's';
      const delay = -(Math.random() * 4).toFixed(1) + 's';
      s.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%; top:${Math.random()*100}%;
        --lo:${lo}; --hi:${hi}; --d:${d}; --delay:${delay};
        opacity:${lo};
      `;
      container.appendChild(s);
    }

    // mote dorate
    for (let i = 0; i < 14; i++) {
      const m = document.createElement('div');
      m.className = 'mote';
      const size = Math.random() * 3 + 1;
      const fd   = (Math.random() * 8 + 6).toFixed(1) + 's';
      const fd2  = -(Math.random() * 10).toFixed(1) + 's';
      const fx   = ((Math.random() - 0.5) * 80).toFixed(0) + 'px';
      m.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        --fd:${fd}; --fdelay:${fd2}; --fx:${fx};
      `;
      container.appendChild(m);
    }
  })();

  /* ---------- dati ---------- */
  function load() {
    try { return JSON.parse(localStorage.getItem(KEY)) || { days: [] }; }
    catch { return { days: [] }; }
  }

  function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

  function todayIdx() {
    const t = new Date(); t.setHours(0,0,0,0);
    const s = new Date(START); s.setHours(0,0,0,0);
    return Math.floor((t - s) / 86400000);
  }

  function init() {
    const data = load();
    const ti = todayIdx();
    // segna automaticamente i giorni passati
    for (let i = 0; i < ti && i < TOTAL; i++) {
      if (!data.days.includes(i)) data.days.push(i);
    }
    save(data);
  }

  function segnaOggi() {
    const data = load();
    const ti   = todayIdx();
    if (ti < 0 || ti >= TOTAL || data.days.includes(ti)) return;
    data.days.push(ti);
    save(data);
    // flash sul bottone
    const btn = document.getElementById('btn');
    btn.style.boxShadow = '0 0 40px rgba(255,180,48,0.75), 0 0 80px rgba(255,180,48,0.3)';
    setTimeout(() => { btn.style.boxShadow = ''; }, 700);
    render();
  }

  function render() {
    const data = load();
    const ti   = todayIdx();
    const done = data.days.length;

    document.getElementById('pctNum').textContent = (done / TOTAL * 100).toFixed(1);

    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    const frag = document.createDocumentFragment();
    for (let i = 0; i < TOTAL; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      if (data.days.includes(i)) dot.classList.add('done');
      if (i === ti)              dot.classList.add('today');
      dot.addEventListener('click', () => {
        const d = load();
        const x = d.days.indexOf(i);
        if (x === -1) d.days.push(i); else d.days.splice(x, 1);
        save(d); render();
      });
      frag.appendChild(dot);
    }
    grid.appendChild(frag);

    const btn       = document.getElementById('btn');
    const inRange   = ti >= 0 && ti < TOTAL;
    const alreadyDone = data.days.includes(ti);
    btn.disabled = !inRange || alreadyDone;
    btn.classList.toggle('segnato', alreadyDone);
    btn.textContent = alreadyDone ? 'Giorno segnato ✦' : 'Segna oggi';
  }

  init();
  render();
</script>

</body>
</html>
