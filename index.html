<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Il Mondo È Mio</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background:
        linear-gradient(rgba(7,5,14,0.45), rgba(7,5,14,0.45)),
        url('scala.jpg') center center / cover no-repeat;
      background-attachment: local;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      min-height: 100vh;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      justify-content: center;
      max-width: 600px;
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: rgba(200,169,110,0.10);
      border: 1px solid rgba(200,169,110,0.22);
      flex-shrink: 0;
      cursor: pointer;
      transition: background 0.3s, box-shadow 0.3s, border-color 0.3s;
    }

    .dot:hover {
      background: rgba(200,169,110,0.30);
      border-color: rgba(200,169,110,0.55);
    }

    .dot.done {
      background: #ffb830;
      border-color: #f0d060;
      box-shadow: 0 0 5px rgba(255,184,48,0.9), 0 0 10px rgba(255,184,48,0.4);
    }

    .dot.today:not(.done) {
      background: rgba(200,169,110,0.28);
      border-color: #c8a96e;
      animation: pulse 2.5s ease-in-out infinite;
    }

    .dot.today.done {
      animation: goldpulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(200,169,110,0.4); }
      50%       { box-shadow: 0 0 0 3px rgba(200,169,110,0.15), 0 0 8px rgba(200,169,110,0.5); }
    }

    @keyframes goldpulse {
      0%, 100% { box-shadow: 0 0 5px rgba(255,184,48,0.9), 0 0 10px rgba(255,184,48,0.4); }
      50%       { box-shadow: 0 0 8px rgba(255,184,48,1), 0 0 22px rgba(255,184,48,0.6); }
    }
  </style>
</head>
<body>

<div class="grid" id="grid"></div>

<script>
  const START = new Date('2026-05-01T00:00:00');
  const TOTAL = 365;
  const KEY   = 'ilmondoemio_v2';

  function load() {
    try { return JSON.parse(localStorage.getItem(KEY)) || { days: [] }; }
    catch { return { days: [] }; }
  }

  function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

  function todayIndex() {
    const t = new Date(); t.setHours(0,0,0,0);
    const s = new Date(START); s.setHours(0,0,0,0);
    return Math.floor((t - s) / 86400000);
  }

  function init() {
    const data = load();
    const ti = todayIndex();
    for (let i = 0; i < ti && i < TOTAL; i++) {
      if (!data.days.includes(i)) data.days.push(i);
    }
    save(data);
  }

  function render() {
    const data = load();
    const ti   = todayIndex();
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    const frag = document.createDocumentFragment();

    for (let i = 0; i < TOTAL; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      if (data.days.includes(i)) dot.classList.add('done');
      if (i === ti)              dot.classList.add('today');

      dot.addEventListener('click', () => {
        const d = load();
        const idx = d.days.indexOf(i);
        if (idx === -1) d.days.push(i);
        else d.days.splice(idx, 1);
        save(d);
        render();
      });

      frag.appendChild(dot);
    }
    grid.appendChild(frag);
  }

  init();
  render();
</script>

</body>
</html>
